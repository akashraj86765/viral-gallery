<style>
  /* Reset */
  * {margin:0;padding:0;box-sizing:border-box;}
  body {
    font-family: 'Arial Black', sans-serif;
    background: linear-gradient(135deg, #0c0c0c, #1a1a1a);
    color: #fff;
    text-align: center;
    overflow-x: hidden;
  }

  h1 {
    margin: 25px 0 5px;

  h3 {

  .card {
    background: rgba(20,20,20,0.9);
    border: 2px solid #ff1a75;

    overflow: hidden;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 20px #ff1a75;
    transition: transform 0.3s, box-shadow 0.3s;
    scroll-margin-top: 20px;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 30px #ff66aa;
  }

  img {
    width: 100%;
    height: auto;
    display: block;
    background: #333;
  }

  .btn {
    display: block;
    margin: 0 auto;
    padding: 20px 20px;
    background: #ff1a75;
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.3em;
    border-radius: 0;
    box-shadow: none;
    border: none;
    width: 100%;
    text-align: center;
  }

  .btn:hover {
    background: #ff0066;
    box-shadow: none;
  }

  .download-btn {
    background: #4CAF50;
    box-shadow: 0 0 15px #4CAF50;
    margin: 10px auto 30px;
    padding: 15px 25px;
    font-size: 1.2em;
    border-radius: 8px;
    width: auto;
    display: inline-block;
  }

  .download-btn:hover {
    box-shadow: 0 0 25px #66BB6A;
    background: #4CAF50;
  }

  @media (max-width: 768px) {
    #gallery {
      gap: 20px;
    }
    .card {
      width: 95%;
      max-width: none;
    }
  }

  .loader {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #ff1a75;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 40px auto;
  }
  
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>

<body>

<h1>Instagram Viral Videos 🔥</h1>
<h3>To Play Videos Download DiskWala App First</h3>

<!-- DiskWala App Download Button -->
<a href="https://play.google.com/store/apps/details?id=com.diskwalaapp" target="_blank" class="btn download-btn">
  📱 Download DiskWala App Now
</a>

<div id="gallery"></div>
<div id="loader" class="loader" style="display: none;"></div>

<script>
// Your Supabase credentials
const SUPABASE_URL = 'https://podqvmggwcszipcbnzdv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvZHF2bWdnd2NzemlwY2JuemR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE5NDgyMDksImV4cCI6MjA3NzUyNDIwOX0.3Hx-8GohlMV5wTeEUZ1UYE72V8934zpoNA3bNup8CmE';

const MAX_POSTS = 100; // Only fetch latest 100 posts
let currentItems = [];
let isLoading = false;
let lastUpdateTime = 0;
const CACHE_DURATION = 300000; // 5 minutes between refreshes

function showLoader(show) {
  const loader = document.getElementById('loader');
  if (loader) {
    loader.style.display = show ? 'block' : 'none';
  }
}

async function loadGallery(forceRefresh = false) {
  const now = Date.now();
  
  if (!forceRefresh && currentItems.length > 0 && (now - lastUpdateTime) < CACHE_DURATION) {
    console.log('Using cached data');
    return;
  }
  
  if (isLoading) return;
  isLoading = true;
  showLoader(true);
  
  try {
    // Fetch only latest MAX_POSTS posts, ordered by newest first
    const response = await fetch(`${SUPABASE_URL}/rest/v1/items?select=*&order=created_at.desc&limit=${MAX_POSTS}`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Cache-Control': 'max-age=300'
      }
    });
    
    if (!response.ok) {
      throw new Error('Failed to fetch data');
    }
    
    let data = await response.json();
    // Data is already sorted by created_at.desc from the query
    
    const newIds = data.map(item => item.id).join(',');
    const oldIds = currentItems.map(item => item.id).join(',');
    
    if (newIds !== oldIds) {
      currentItems = data;
      renderGallery(data);
      lastUpdateTime = now;
      console.log(`Gallery updated: ${data.length} items (latest ${MAX_POSTS})`);
    } else if (currentItems.length === 0 && data.length > 0) {
      currentItems = data;
      renderGallery(data);
      lastUpdateTime = now;
    } else if (data.length === 0) {
      renderGallery([]);
    }
    
  } catch (error) {
    console.error('Error loading gallery:', error);
    if (currentItems.length === 0) {
      document.getElementById("gallery").innerHTML = "<p style='color: #ff4da6;'>Error loading content. Please refresh.</p>";
    }
  } finally {
    isLoading = false;
    showLoader(false);
  }
}

function renderGallery(items) {
  const gallery = document.getElementById("gallery");
  const fragment = document.createDocumentFragment();

  if (items.length === 0) {
    gallery.innerHTML = "<p style='color: #ff80bf; font-size: 1.2em;'>No content yet. Check back soon! 🔥</p>";
    return;
  }

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${item.image}" alt="Viral content" loading="lazy" referrerpolicy="no-referrer" />
      <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="btn">Watch Now</a>
    `;
    fragment.appendChild(div);
  });

  gallery.innerHTML = "";
  gallery.appendChild(fragment);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(reg => console.log('✅ Service Worker registered'))
    .catch(err => console.error('❌ Service Worker failed:', err));
}

loadGallery();

setInterval(() => {
  if (!document.hidden) {
    loadGallery(false);
  }
}, 300000);

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    loadGallery(false);
  }
});

let touchStart = 0;
document.addEventListener('touchstart', (e) => {
  if (window.scrollY === 0) {
    touchStart = e.touches[0].clientY;
  }
});
document.addEventListener('touchend', (e) => {
  const touchEnd = e.changedTouches[0].clientY;
  if (window.scrollY === 0 && touchEnd > touchStart + 80) {
    loadGallery(true);
  }
});
</script>
</body>
</html>
