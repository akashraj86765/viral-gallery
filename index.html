<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Videos Gallery 🔥</title>
<style>
  /* Reset */
  * {margin:0;padding:0;box-sizing:border-box;}
  body {
    font-family: 'Arial Black', sans-serif;
    background: linear-gradient(135deg, #0c0c0c, #1a1a1a);
    color: #fff;
    text-align: center;
    overflow-x: hidden;
  }

  h1 {
    margin: 25px 0 5px;
    font-size: 2.8em;
    color: #ff1a75;
    text-shadow: 0 0 10px #ff4da6;
  }

  h3 {
    margin-bottom: 25px;
    font-weight: 400;
    color: #ff80bf;
  }

  #gallery {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding-bottom: 50px;
  }

  .card {
    background: rgba(20,20,20,0.9);
    border: 2px solid #ff1a75;
    border-radius: 15px;
    overflow: hidden;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 20px #ff1a75;
    transition: transform 0.3s, box-shadow 0.3s;
    scroll-margin-top: 20px;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 30px #ff66aa;
  }

  img {
    width: 100%;
    height: 300px;
    object-fit: cover;
  }

  .btn {
    display: block;
    margin: 15px auto 20px;
    padding: 12px 20px;
    background: #ff1a75;
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.1em;
    border-radius: 8px;
    box-shadow: 0 0 15px #ff4da6;
    transition: 0.3s;
  }

  .btn:hover {
    box-shadow: 0 0 25px #ff80bf;
  }

  /* Mobile reel-style partial next post visible */
  @media (max-width: 768px) {
    #gallery {
      gap: 20px;
    }
    .card {
      width: 95%;
      max-width: none;
    }
  }
</style>
</head>
<body>

<h1>Viral Videos Gallery 🔥</h1>
<h3>Hot content feed</h3>

<div id="gallery"></div>

<script>
// Your Supabase credentials
const SUPABASE_URL = 'https://podqvmggwcszipcbnzdv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvZHF2bWdnd2NzemlwY2JuemR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE5NDgyMDksImV4cCI6MjA3NzUyNDIwOX0.3Hx-8GohlMV5wTeEUZ1UYE72V8934zpoNA3bNup8CmE';

// Load gallery from Supabase
async function loadGallery() {
  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/items?select=*`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    
    if (!response.ok) {
      throw new Error('Failed to fetch data');
    }
    
    const data = await response.json();
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    // Sort by timestamp (newest first)
    const entries = data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    
    entries.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <img src="${item.image}" alt="Viral content" />
        <a href="${item.link}" target="_blank" class="btn">Watch Now</a>
      `;
      gallery.appendChild(div);
    });

    // If no images, show message
    if (entries.length === 0) {
      gallery.innerHTML = "<p style='color: #ff80bf; font-size: 1.2em;'>No content yet. Send photos to your bot! 🔥</p>";
    }
  } catch (error) {
    console.error('Error loading gallery:', error);
    document.getElementById("gallery").innerHTML = "<p style='color: #ff4da6;'>Error loading content. Please refresh.</p>";
  }
}

loadGallery();
setInterval(loadGallery, 10000); // auto-refresh every 10s
</script>
</body>
</html>
