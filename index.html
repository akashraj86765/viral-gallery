}

.card:hover .glow-line {
  background: #ff66aa;
  box-shadow: 0 0 10px #ff66aa, 0 0 20px #ff66aa;
}

/* Full-width Watch Now button at card bottom */
.card .btn {
  display: block;
  width: 100%;
  margin: 0;
  padding: 15px 0;
  background: #ff1a75;
  color: #fff;
  text-decoration: none;
  font-weight: bold;
  font-size: 1.1em;
  border-radius: 0 0 15px 15px;
  box-shadow: 0 0 15px #ff4da6;
  transition: 0.3s;
  text-align: center;
}

.card .btn:hover {
  box-shadow: 0 0 25px #ff80bf;
  background: #ff66aa;
}

/* Loading indicator */
.loading {
  display: none;
  color: #ff80bf;
  font-size: 1.2em;
  margin: 20px 0;
}

.loading.show {
  display: block;
}

/* Mobile adjustments */
@media (max-width: 768px) {
  #gallery { gap: 20px; }
  .card { width: 95%; max-width: none; }
  .subtitle {

    padding: 0 15px;
  }
}

html {
  scroll-behavior: smooth;
}

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}

async function loadPosts() {
  if (isLoading || !hasMoreData) return;
  
  isLoading = true;
  loadingIndicator.classList.add('show');
  
  try {
    const res = await fetch(DB_URL);
    const data = await res.json();
    if (!data) {
      hasMoreData = false;
      return;
    }

    const entries = Object.entries(data)
      .sort((a,b) => b[1].timestamp - a[1].timestamp);

    const newEntries = entries.filter(([key]) => !lastFetchedKeys.includes(key));
    
    if (newEntries.length === 0) {
      hasMoreData = false;
      return;
    }

    const batch = newEntries.slice(0, BATCH_SIZE);
    
    for (let i = 0; i < batch.length; i++) {
      const [key, item] = batch[i];
      
      const div = document.createElement("div");
      div.className = "card";
      div.style.animationDelay = `${i * 0.1}s`;
      div.innerHTML = `
        <img src="${item.image}" loading="lazy" alt="Viral video thumbnail" />
        <div class="glow-line"></div>
        <a href="${item.link}" target="_blank" class="btn">Watch Now</a>
      `;
      
      gallery.appendChild(div);
      lastFetchedKeys.push(key);
      
      if (i < batch.length - 1) {
        await new Promise(resolve => setTimeout(resolve, 50));
      }
    }
    
    if (newEntries.length <= BATCH_SIZE) {
      hasMoreData = false;
    }
    
  } catch (err) {
    console.error("Error loading posts:", err);
    hasMoreData = false;
  } finally {
    isLoading = false;
    loadingIndicator.classList.remove('show');
  }
}

function checkScroll() {
  const scrollThreshold = 500;
  const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
  
  if (scrollTop + clientHeight >= scrollHeight - scrollThreshold) {
    loadPosts();
  }
}

loadPosts();

window.addEventListener("scroll", throttle(checkScroll, 200));
window.addEventListener("resize", throttle(checkScroll, 200));
