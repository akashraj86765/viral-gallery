<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Videos Gallery 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: white;
        }
        .header {
            text-align: center;
            padding: 2rem 1rem;
            background: linear-gradient(45deg, #ff0055, #00ff88);
            color: black;
            font-weight: bold;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .download-banner {
            background: #1a1a1a;
            padding: 1rem;
            text-align: center;
            border-bottom: 2px solid #ff0055;
        }
        .download-banner a {
            color: #00ff88;
            font-size: 1.2rem;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #00ff88;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            transition: 0.3s;
        }
        .download-banner a:hover {
            background: #00ff88;
            color: black;
        }
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .gallery-item {
            width: 100%;
            margin-bottom: 2rem;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255,0,85,0.3);
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 2px solid #00ff88;
        }
        .watch-btn {
            display: block;
            background: #ff0055;
            color: white;
            text-align: center;
            padding: 1rem;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .watch-btn:hover {
            background: #00ff88;
            color: black;
        }
        .empty-gallery {
            text-align: center;
            padding: 3rem;
            color: #666;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 Viral Videos Gallery 🔥</h1>
    </div>
    <div class="download-banner">
        <a href="#" target="_blank">📱 Download DiskWala App Now</a>
    </div>

    <div id="gallery-container" class="gallery">
        <!-- Items will be injected here -->
    </div>

    <div id="empty-message" class="empty-gallery" style="display: none;">
        ✨ No videos yet. Check back later!
    </div>

    <!-- Supabase JS client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 🔁 REPLACE WITH YOUR ACTUAL SUPABASE URL AND ANON KEY
        const SUPABASE_URL = 'https://podqvmggwcszipcbnzdv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvZHF2bWdnd2NzemlwY2JuemR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE5NDgyMDksImV4cCI6MjA3NzUyNDIwOX0.3Hx-8GohlMV5wTeEUZ1UYE72V8934zpoNA3bNup8CmE';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const galleryContainer = document.getElementById('gallery-container');
        const emptyMessage = document.getElementById('empty-message');

        async function loadGallery() {
            try {
                const { data: items, error } = await supabase
                    .from('items')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (items && items.length > 0) {
                    emptyMessage.style.display = 'none';
                    renderItems(items);
                } else {
                    emptyMessage.style.display = 'block';
                    galleryContainer.innerHTML = '';
                }
            } catch (err) {
                console.error('Error loading gallery:', err);
                emptyMessage.textContent = 'Error loading gallery. Please try again later.';
                emptyMessage.style.display = 'block';
            }
        }

        function renderItems(items) {
            galleryContainer.innerHTML = items.map(item => `
                <div class="gallery-item">
                    <img src="${item.image}" alt="Gallery image" loading="lazy">
                    <a href="${item.link}" class="watch-btn" target="_blank" rel="noopener noreferrer">Watch Now</a>
                </div>
            `).join('');
        }

        loadGallery();
    </script>
</body>
</html>
